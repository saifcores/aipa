spring:
  application:
    name: payment-ai-assistant
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:aipa}
    username: ${DB_USER:aipa}
    password: ${DB_PASSWORD:aipa}
    hikari:
      maximum-pool-size: 10
      pool-name: aipa-pool
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
  # OpenAI starter auto-config disabled; ChatModel comes from AiModelConfiguration.
  autoconfigure:
    exclude:
      - dev.langchain4j.openai.spring.AutoConfig

server:
  port: ${SERVER_PORT:8080}

aipa:
  security:
    api-key: ${AIPA_API_KEY:dev-api-key-change-me}
  cors:
    allowed-origins: ${AIPA_CORS_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
  ai:
    # true = offline deterministic model; false = live OpenAI tool-calling
    stub-enabled: ${AIPA_AI_STUB:true}

langchain4j:
  open-ai:
    chat-model:
      api-key: ${OPENAI_API_KEY:demo-key}
      model-name: ${OPENAI_MODEL:gpt-4o-mini}
      temperature: 0.1
      log-requests: ${AIPA_AI_LOG:false}
      log-responses: ${AIPA_AI_LOG:false}
      max-retries: 2

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318}/v1/traces
  observations:
    key-values:
      application: payment-ai-assistant

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: method

logging:
  level:
    root: INFO
    com.aipa: INFO
    dev.langchain4j: INFO
  pattern:
    level: "%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]"

---
spring:
  config:
    activate:
      on-profile: local

logging:
  level:
    com.aipa: DEBUG
    org.hibernate.SQL: DEBUG
